name: Go

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up ziglang
      uses: mlugg/setup-zig@v1
      with:
        version: '0.11.0'

    - name: Build
      run: | 
        zig build
        dir .\src\bin\

    - name: Test
      run: |
        .\zig-out\bin\zigdonut.exe testpe\rusthello32.exe instance32
        .\zig-out\bin\pedebug32.exe
        .\zig-out\bin\zigdonut.exe testpe\rusthello64.exe instance64
        .\zig-out\bin\pedebug64.exe
        .\zig-out\bin\zigdonut.exe .\zig-out\bin\test_elf test_elf.sc

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ./zig-out/bin/*